volumes:
    langgraph-data:
        driver: local

services:
    langgraph-redis:
        image: redis:6
        healthcheck:
            test: redis-cli ping
            interval: 5s
            timeout: 1s
            retries: 5
        ports:
            - "6379:6379"

    langgraph-postgres:
        image: postgres:16
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: postgres
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        volumes:
            - langgraph-data:/var/lib/postgresql/data
        healthcheck:
            test: pg_isready -U postgres
            start_period: 10s
            timeout: 1s
            retries: 5
            interval: 5s

    langgraph-api:
        build: .
        ports:
            - "8123:2024"
        depends_on:
            langgraph-redis:
                condition: service_healthy
            langgraph-postgres:
                condition: service_healthy
        # Load GOOGLE_API_KEY and LANGSMITH_API_KEY from the .env file next to
        # this compose file, instead of hardcoding secrets in YAML.
        env_file:
            - .env
        environment:
            REDIS_URI: redis://langgraph-redis:6379
            POSTGRES_URI: postgres://postgres:postgres@langgraph-postgres:5432/postgres?sslmode=disable
            # These read the values loaded from .env above.
            GOOGLE_API_KEY: ${GOOGLE_API_KEY}
            LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
            LANGGRAPH_HOST: 0.0.0.0  # ← Add this

    auth-api:
        build: ./auth_service
        ports:
            - "8124:8000"
        depends_on:
            langgraph-postgres:
                condition: service_healthy
        environment:
            DATABASE_URL: postgres://postgres:postgres@langgraph-postgres:5432/postgres?sslmode=disable
            FRONTEND_ORIGIN: http://localhost:5500
            SESSION_TTL_DAYS: "7"